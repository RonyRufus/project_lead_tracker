name: project_lead_tracker
description: GPS-based project lead tracker with voice trigger and offline storage.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Voice / Speech
  flutter_tts: ^4.0.2
  porcupine_flutter: ^3.0.3
  flutter_voice_processor: ^1.1.2
  record: ^5.0.0
  whisper_ggml: ^1.7.0

  # Background service
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.0.0

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.3

  # Permissions
  permission_handler: ^11.3.0

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  csv: ^5.1.1
  share_plus: 12.0.1
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/porcupine/location_en_android_v4_0_0.ppn
